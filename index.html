<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosso Mural (C & L) </title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="mural">
    <!-- Imagem 1 com Descrição -->
    <div class="paper" style="--rotation: 1;">
      <div style="display: flex; align-items: center;">
        <img src="/img/lancheerrado.jpg" alt="O lanche que deu errado">
        <p style="margin-left: 10px; font-size: 14px;">O lanche que deu errado</p>
      </div>
    </div>
  
    <!-- Imagem 2 com Descrição -->
    <div class="paper" style="--rotation: -8;">
      <div style="display: flex; align-items: center;">
        <img src="/img/diaincrivel.jpg" alt="Dia incrível">
        <p style="margin-left: 10px; font-size: 14px;">Dia incrível</p>
      </div>
    </div>
  
    <!-- Frase 2 -->
    <div class="paper" style="--rotation: 6;">
      <p>🎉 Você transforma o comum em extraordinário!</p>
    </div>
  
    <!-- Imagem 3 com Descrição -->
    <div class="paper" style="--rotation: -6;">
      <div style="display: flex; align-items: center;">
        <img src="/img/bomteamar.jpg" alt="Como é bom te amar">
        <p style="margin-left: 10px; font-size: 14px;">Como é bom te amar</p>
      </div>
    </div>

        <!-- Imagem 5 com Descrição -->
        <div class="paper" style="--rotation: -5;">
          <div style="display: flex; align-items: center;">
            <img src="/img/meudiamante.jpg" alt="Meu Diamante">
            <p style="margin-left: 10px; font-size: 14px;">Meu Diamante</p>
          </div>
        </div>
  
    <!-- Imagem 4 com Descrição -->
    <div class="paper" style="--rotation: 6;">
      <div style="display: flex; align-items: center;">
        <img src="/img/mengaocampeaooo.jpg" alt="Mengão campeão!">
        <p style="margin-left: 10px; font-size: 14px;">Mengão campeão! e eu tbm!</p>
      </div>
    </div>
  
    <!-- Frase 3 -->
    <div class="paper" style="--rotation: -8;">
      <p>💫 Amar você é o meu maior presente.</p>
    </div>
  
    <!-- Imagem 5 com Descrição -->
    <div class="paper" style="--rotation: -5;">
      <div style="display: flex; align-items: center;">
        <img src="/img/obasico.jpg" alt="O básico">
        <p style="margin-left: 10px; font-size: 14px;">O básico</p>
      </div>
    </div>
  
    <!-- Frase 1 -->
    <div class="paper" style="--rotation: 3;">
      <p>💖 Ao seu lado, cada momento é único!</p>
    </div>
  </div>
  
  <iframe 
    class="spotify-player" 
    src="https://open.spotify.com/embed/track/1qxuVUQPbhbp4jDXaN8fJT?si=4c3a17a2c27b44fd" 
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>


<script src="script.js"></script>
</body>
</html>
